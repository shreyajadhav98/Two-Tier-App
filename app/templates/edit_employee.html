<!DOCTYPE html>
<html>

<head>

<title>Edit Employee</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Edit Employee</h1>

<form method="POST">

<input
type="text"
name="name"
value="{{employee.name}}"
required>

<input
type="email"
name="email"
value="{{employee.email}}"
required>

<input
type="text"
name="department"
value="{{employee.department}}"
required>

<input
type="number"
name="salary"
value="{{employee.salary}}"
required>

<button type="submit">

Update Employee

</button>

</form>

<a href="/">Back</a>

</div>

</body>

</html>
