version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: shreya
      MYSQL_DATABASE: employee_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - app-network

  flask:
    build: .
    container_name: flask-container
    restart: always

    depends_on:
      - mysql

    ports:
      - "5000:5000"

    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network: